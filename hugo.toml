# URL LIMPIA - Sin corchetes ni paréntesis
baseURL = "https://danielrn13.github.io/monalisa-snacks.github.io/"
languageCode = "es-mx"
title = "Monalisa Crepes & Burgers"
theme = "ananke"

# RUTAS RELATIVAS (Obliga a Hugo a buscar dentro de la subcarpeta)
canonifyURLs = false
relativeURLs = true

[params]
  author = "Mona"
  description = "Las mejores crepas y hamburguesas artesanales."
  # SIN la barra inicial /
  featured_image = "images/banner-principal.jpg"
  custom_css = ["css/custom.css"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Eliminamos la sección [[menu.main]] para que desaparezca la palabra "Inicio"