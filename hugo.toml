# baseURL SIN corchetes ni paréntesis, solo la URL
baseURL = "https://danielrn13.github.io/monalisa-snacks.github.io/"
languageCode = "es-mx"
title = "Monalisa Crepes & Burgers"
theme = "ananke"

# CONFIGURACIÓN DE ORO PARA SUB-CARPETAS (Garantiza que el CSS cargue)
canonifyURLs = false
relativeURLs = true

[params]
  author = "Mona"
  description = "Las mejores crepas y hamburguesas artesanales."
  # Ruta SIN barra inicial para que relativeURLs la encuentre
  featured_image = "images/banner-principal.jpg"
  # Nombre exacto de tu archivo CSS en static/css/
  custom_css = ["css/layout.css"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# NO AGREGAR [[menu.main]] PARA QUE NO APAREZCA LA PALABRA "INICIO"