# Workflow para desplegar el sitio de Monalisa en GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Se dispara cuando haces push a la rama main
  push:
    branches: ["main"]

  # Permite disparar el proceso manualmente desde la pestaña Actions
  workflow_dispatch:

# Configuración de permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se ejecuten múltiples despliegues al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Tarea de construcción (Build)
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.1 # Versión estable de Hugo
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb          

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          submodules: recursive # Importante si usas temas como submodulos de git

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build con Hugo
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"          

      - name: Subir artefacto para despliegue
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Tarea de despliegue (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4